<!DOCTYPE html>
<html>

<head>
    <title>Sample</title>
    <style>
        /*container tag name*/
        table {
            width: 1000px;
            border: 1px solid #000;   
        }
   
        td, tr {
             border: 1px solid #000; 
        }
        .header {
            text-align: center;
        }

        .content {
            width: 70%;
        }

        .r-sidebar {
            width: 30%;
        }
tfoot {
    text-align: center;
}
    </style>
 
</head>
<body>
    
     <table>  
    <thead>
            <tr>
                <th class="header" colspan="2">header</th>
            </tr>
        </thead>
        
        <tbody>
            <tr>
                <td class="content">content</td>
                <td class="r-sidebar">right sidebar</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="2">footer</td>
            </tr>
        </tfoot>
        
         </table> 
</body>
 

</html>
